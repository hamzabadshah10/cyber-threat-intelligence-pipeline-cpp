<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Threat Intel Dashboard</title>
    <style>
        :root {
            --bg-color: #050b14;
            --surface: #0a111c;
            --neon-blue: #00f3ff;
            --neon-red: #ff003c;
            --neon-green: #00ff66;
            --neon-purple: #b538ff;
            --text-main: #a9bada;
            --grid-line: rgba(0, 243, 255, 0.05);
        }

        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            background: var(--surface);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--neon-blue);
            padding-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        /* --- NEW ANALYTICS WIDGETS --- */
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.2);
            padding: 20px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-card.critical { border-color: rgba(255, 0, 60, 0.5); background: rgba(255, 0, 60, 0.05); }
        .stat-card.alienvault { border-color: rgba(181, 56, 255, 0.5); background: rgba(181, 56, 255, 0.05); }

        .stat-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #747d8c;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .stat-value.red { color: var(--neon-red); text-shadow: 0 0 10px rgba(255, 0, 60, 0.5); }
        .stat-value.purple { color: var(--neon-purple); text-shadow: 0 0 10px rgba(181, 56, 255, 0.5); }
        /* ----------------------------- */

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th {
            background-color: rgba(0, 243, 255, 0.05);
            color: var(--neon-blue);
            padding: 15px;
            border-bottom: 1px solid var(--neon-blue);
        }
        td { padding: 15px; border-bottom: 1px solid #1a2639; }
        tr:hover { background-color: rgba(0, 243, 255, 0.05); }
        .ip-address { color: #fff; font-weight: bold; }
        .score-critical { color: var(--neon-red); font-weight: bold; }
        .score-warning { color: #ffa502; font-weight: bold; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>[|||] SOC Threat Intel Feed & Analytics</h1>
        </div>

        <!-- NEW ANALYTICS SECTION -->
        <div class="analytics-grid">
            <div class="stat-card">
                <div class="stat-title">Total Processed Threats</div>
                <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-card critical">
                <div class="stat-title">Critical Severity (>80)</div>
                <div class="stat-value red" id="stat-critical">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">AbuseIPDB Sources</div>
                <div class="stat-value" id="stat-abuse">0</div>
            </div>
            <div class="stat-card alienvault">
                <div class="stat-title">AlienVault Sources</div>
                <div class="stat-value purple" id="stat-alien">0</div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>SYS_ID</th>
                    <th>INDICATOR</th>
                    <th>TYPE</th>
                    <th>ENRICHED_SCORE</th>
                    <th>DATA_SOURCE</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="5" style="text-align: center; color: var(--neon-green);">> SECURE UPLINK ESTABLISHED. FETCHING DATA...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const apiUrl = 'http://localhost:8083/api/threats';

        async function fetchThreats() {
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                // --- ANALYTICS CALCULATIONS ---
                const totalThreats = data.length;
                const criticalThreats = data.filter(t => t.severityScore > 80).length;
                const abuseCount = data.filter(t => t.source === 'AbuseIPDB').length;
                const alienCount = data.filter(t => t.source === 'AlienVault OTX').length;

                // Update UI Stats
                document.getElementById('stat-total').innerText = totalThreats;
                document.getElementById('stat-critical').innerText = criticalThreats;
                document.getElementById('stat-abuse').innerText = abuseCount;
                document.getElementById('stat-alien').innerText = alienCount;
                // ------------------------------

                const tableBody = document.getElementById('table-body');
                const recentThreats = data.slice(0, 100); // Show only top 100 to save memory
                let rowsHtml = '';
                
                recentThreats.forEach(threat => {
                    // Make it yellow if score is medium, red if high
                    const scoreClass = threat.severityScore > 80 ? 'score-critical' : 'score-warning';
                    
                    rowsHtml += `
                        <tr>
                            <td style="color: #4b6584;">#${threat.id}</td>
                            <td class="ip-address">> ${threat.iocValue}</td>
                            <td style="color: var(--neon-green);">${threat.iocType}</td>
                            <td class="${scoreClass}">[ ${threat.severityScore} / 100 ]</td>
                            <td style="color: #747d8c;">${threat.source}</td>
                        </tr>
                    `;
                });

                tableBody.innerHTML = rowsHtml;

            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('table-body').innerHTML = 
                    '<tr><td colspan="5" style="color: red; text-align: center;">> ERROR: CONNECTION TO THREAT API LOST.</td></tr>';
            }
        }

        setTimeout(fetchThreats, 500);
    </script>
</body>
</html>
